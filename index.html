<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erez Lazarof — Digital Business Card</title>
  <meta name="description" content="כרטיס ביקור דיגיטלי של ארז לזרוף" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.12);
    }

    html, body {
      height: 100%;
      font-family: 'Heebo', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg-1);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background:
        radial-gradient(circle at 20% 0%, rgba(99, 102, 241, 0.25) 0%, transparent 50%),
        radial-gradient(circle at 80% 100%, rgba(139, 92, 246, 0.25) 0%, transparent 50%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
      background-attachment: fixed;
      position: relative;
    }

    /* Subtle animated background dots */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      animation: fadeUp 0.8s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      color: white;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      z-index: -1;
      opacity: 0.3;
      filter: blur(10px);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .title {
      text-align: center;
      color: var(--text-muted);
      font-size: 1.05rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    .tagline {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      font-style: italic;
      opacity: 0.8;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.95rem 1.25rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.25s ease;
      direction: ltr;
      text-align: left;
    }

    .link:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
      stroke: white;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .link-content {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .link-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .link-value {
      font-size: 0.95rem;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      .card { padding: 2.5rem 1.75rem; }
      h1 { font-size: 1.65rem; }
      .avatar { width: 100px; height: 100px; font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="avatar">EL</div>
    <h1>Erez Lazarof</h1>
    <p class="title">Product &amp; Operations</p>
    <p class="tagline">Building things, one repo at a time.</p>

          <span class="link-value">github.com/erezlazarof</span>

      </a>
    </nav>

    <footer>
      &copy; <span id="year"></span> Erez Lazarof
    </footer>
  </main>

  <script>

</body>
</html>
